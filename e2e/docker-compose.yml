services:
  postgres:
    image: postgres:16-alpine
    container_name: post-anki-e2e-db
    environment:
      POSTGRES_USER: postanki
      POSTGRES_PASSWORD: postanki
      POSTGRES_DB: postanki_e2e
    ports:
      - '5436:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postanki -d postanki_e2e']
      interval: 2s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
